name: Docs

# Builds the mkdocs site and deploys to GitHub Pages on pushes to main.
# One-time setup (owner): repo Settings -> Pages -> Build and deployment ->
# Source: "Deploy from a branch" -> branch `gh-pages` (created by mkdocs gh-deploy).
on:
  push:
    branches: [main]

permissions:
  contents: write        # mkdocs gh-deploy pushes to gh-pages

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[docs]"
      - run: mkdocs gh-deploy --force
