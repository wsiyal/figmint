name: Release

# Publishes to PyPI on a version tag using Trusted Publishing (OIDC) — no stored tokens.
# One-time setup (owner): register `figmint` as a pending publisher on PyPI (and TestPyPI
# first) pointing at repo wsiyal/figmint, workflow release.yml, environment `pypi`.
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build            # sdist + wheel -> dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi                    # add protection rules to this env in repo settings
    permissions:
      id-token: write                    # REQUIRED for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        # For a TestPyPI dry-run, temporarily set:
        # with:
        #   repository-url: https://test.pypi.org/legacy/
